
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluid-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fluid-app
  template:
    metadata:
      labels:
        app: fluid-app
    spec:
      containers:
      - name: fluid-app
        image: 9691427913/fluid-app:v3
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: mysql
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: rootpass
        - name: DB_NAME
          value: fluiddb
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10

