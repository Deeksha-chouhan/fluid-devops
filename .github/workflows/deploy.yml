name: Build Push and Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fluid-app:latest ./app

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/fluid-app:latest

    - name: Deploy to k3s Kubernetes on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo kubectl set image deployment/fluid-app fluid-app=${{ secrets.DOCKERHUB_USERNAME }}/fluid-app:latest
          sudo kubectl rollout status deployment/fluid-app
          sudo kubectl get pods
          sudo kubectl get svc
